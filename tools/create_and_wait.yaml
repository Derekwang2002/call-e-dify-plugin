identity:
  name: create_and_wait
  author: Derekwang2002
  label:
    en_US: Create And Wait For CALL-E Call
description:
  human:
    en_US: Preview or create one CALL-E call, then poll until the call reaches a terminal status or timeout.
  llm: Preview or create one CALL-E outbound phone call, then poll GET /v1/calls/{id} until terminal status or timeout. Live calls require dry_run=false and confirm_live_call=true.
parameters:
  - name: phone_number
    type: string
    required: true
    form: llm
    label:
      en_US: Phone Number
    human_description:
      en_US: Destination phone number in E.164 format.
    llm_description: Destination phone number in E.164 format, for example +15555550123.
  - name: task
    type: string
    required: true
    form: llm
    label:
      en_US: Call Task
    human_description:
      en_US: Instructions for the CALL-E phone-call agent.
    llm_description: Clear bounded instructions for the phone-call agent. Do not include secrets or unnecessary personal data.
  - name: dry_run
    type: boolean
    required: false
    default: true
    form: llm
    label:
      en_US: Dry Run
    human_description:
      en_US: When true, returns a masked preview without creating a call.
    llm_description: Set to false only when the user explicitly wants one live call.
  - name: confirm_live_call
    type: boolean
    required: false
    default: false
    form: llm
    label:
      en_US: Confirm Live Call
    human_description:
      en_US: Must be true with dry_run=false before the tool creates a live call.
    llm_description: Must be true with dry_run=false before creating a live outbound phone call.
  - name: region
    type: string
    required: false
    default: US
    form: llm
    label:
      en_US: Region
    human_description:
      en_US: Region hint for CALL-E.
    llm_description: Region hint, for example US or BR.
  - name: locale
    type: string
    required: false
    default: en-US
    form: llm
    label:
      en_US: Locale
    human_description:
      en_US: Locale hint for CALL-E.
    llm_description: Locale hint, for example en-US or pt-BR.
  - name: metadata_json
    type: string
    required: false
    form: llm
    label:
      en_US: Metadata JSON
    human_description:
      en_US: Optional metadata object as a JSON string.
    llm_description: Optional JSON object string. Do not include secrets or unnecessary personal data.
  - name: poll_interval_seconds
    type: number
    required: false
    default: 5
    form: llm
    label:
      en_US: Poll Interval Seconds
    human_description:
      en_US: Seconds between result lookups.
    llm_description: Seconds between result lookups. Values are clamped between 1 and 60.
  - name: wait_timeout_minutes
    type: number
    required: false
    default: 15
    form: llm
    label:
      en_US: Wait Timeout Minutes
    human_description:
      en_US: Maximum wait time before returning timeout.
    llm_description: Maximum wait time before returning timeout. Values are clamped between 1 and 60.
extra:
  python:
    source: tools/create_and_wait.py
output_schema:
  type: object
  properties:
    dry_run:
      type: boolean
    live_call_created:
      type: boolean
    masked_phone:
      type: string
    call_id:
      type: string
    poll_count:
      type: number
    timed_out:
      type: boolean
    result:
      type: object
