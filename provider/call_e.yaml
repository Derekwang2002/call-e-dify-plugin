identity:
  author: Derekwang2002
  name: call_e
  label:
    en_US: CALL-E
  description:
    en_US: Create, fetch, and wait for CALL-E one-shot outbound phone calls.
  icon: icon.svg
  tags:
    - productivity
    - utilities
credentials_for_provider:
  api_key:
    type: secret-input
    required: true
    label:
      en_US: CALL-E API key
    placeholder:
      en_US: Enter your CALL-E API key
    help:
      en_US: Used as a Bearer token for CALL-E API requests.
  base_url:
    type: text-input
    required: true
    label:
      en_US: CALL-E API base URL
    placeholder:
      en_US: https://api.heycall-e.com
    help:
      en_US: CALL-E API host only. Do not include /v1.
    default: https://api.heycall-e.com
tools:
  - tools/create_call.yaml
  - tools/get_call.yaml
  - tools/create_and_wait.yaml
extra:
  python:
    source: provider/call_e.py
